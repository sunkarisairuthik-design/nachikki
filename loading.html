<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="loading.css">

</head>

<body>

<div class="loader-container">

    <div class="glass-card">

        <div class="heart-loader">
            ❤️
        </div>

        <h1>Our Memories</h1>

        <p id="loadingText">
            Collecting our beautiful moments...
        </p>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <div id="percent">
            0%
        </div>

        <div class="slideshow">

            <img id="slideImage"
                 src="fir-selfie.jpg">

        </div>

    </div>

</div>

<script src="loading.js"></script>

</body>

</html>
